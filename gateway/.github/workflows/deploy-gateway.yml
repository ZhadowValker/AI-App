# .github/workflows/deploy-gateway.yml
# Auto-deploys the gateway to Railway on every push to main.
#
# Setup:
#   1. Go to railway.app → your project → Settings → Tokens
#   2. Create a token and add to GitHub Secrets as RAILWAY_TOKEN
#   3. Add your Railway service ID as RAILWAY_SERVICE_ID

name: Deploy Gateway

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'
      - '.github/workflows/deploy-gateway.yml'

jobs:
  test:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        working-directory: gateway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }}
